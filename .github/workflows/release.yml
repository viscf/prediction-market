name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    name: Build ${{ matrix.platform }} image
    if: github.repository == 'kuestcom/prediction-market'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            artifact: docker-digest-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: docker-digest-arm64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/kuestcom/prediction-market
          flavor: |
            latest=auto
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=ref,event=tag

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ghcr.io/kuestcom/prediction-market
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Export image digest
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          digest="$DIGEST"
          if [ -z "$digest" ]; then
            echo "docker build did not return a digest" >&2
            exit 1
          fi
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image:
    name: Publish image manifest
    needs: build-image
    if: github.repository == 'kuestcom/prediction-market'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/kuestcom/prediction-market
          flavor: |
            latest=auto
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=ref,event=tag

      - name: Publish multi-platform manifest
        shell: bash
        env:
          IMAGE_NAME: ghcr.io/kuestcom/prediction-market
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              tag_args+=("-t" "$tag")
            fi
          done <<< "$TAGS"

          refs=()
          for digest_file in /tmp/digests/*; do
            refs+=("${IMAGE_NAME}@sha256:$(basename "$digest_file")")
          done
          if [ "${#refs[@]}" -ne 2 ]; then
            echo "expected 2 image digests, found ${#refs[@]}" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"
